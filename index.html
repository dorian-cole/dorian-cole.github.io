<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Dorian Cole</title>
  <meta name="description" content="Dorian Cole — portfolio site, coming soon." />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #111418;
      --muted: #5b6473;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0b0d12; --fg: #e6e8ee; --muted: #9098a6; }
    }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main { max-width: 32rem; }
    h1 { margin: 0 0 0.5rem; font-size: clamp(2rem, 5vw, 3rem); letter-spacing: -0.02em; }
    p { margin: 0; color: var(--muted); line-height: 1.55; }
  </style>
</head>
<body>
  <main>
    <h1>Dorian Cole</h1>
    <p>Site coming soon.</p>
  </main>
</body>
</html>
